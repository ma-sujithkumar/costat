; CoStat - single global configuration file.
; All paths, hyperparameters and tunables live here so nothing is hardcoded
; inside the Python sources. Sections are referenced by the matching module.
; ExtendedInterpolation is used, so ${section:key} expands other values.

[python]
; The one and only python binary used for every script in this project.
PYTHON = /home/sujithma/venv/bin/python

[paths]
project_root = /home/sujithma/costat
data_dir = ${project_root}/data
output_dir = ${project_root}/claude_outputs
plots_dir = ${project_root}/plots
docs_dir = ${project_root}/docs
checkpoint_dir = ${output_dir}/checkpoints
; Figures and CSV reports are tracked so the published repo shows the results.
results_dir = ${project_root}/results
config_dir = ${project_root}/config

[training]
; Default epoch count. Individual models can override this in models.json
; (the residual model trains a little longer for a fair FP32 baseline).
epochs = 3
batch_size = 128
learning_rate = 0.001
seed = 42
device = cpu
num_workers = 2
; Number of test batches used to collect weights and pre-activations.
calibration_batches = 8

[controller]
candidates_config = ${paths:config_dir}/distributions.json
scoring_config = ${paths:config_dir}/scoring.json
; Histogram resolution for the empirical density used by KL divergence.
histogram_bins = 256
; Cap on the number of samples used when fitting a distribution, so the
; maximum-likelihood fits stay fast even on large weight tensors.
max_fit_samples = 20000

[quantization]
; Weight bit-widths to sweep. Each maps to 2 ** bit reconstruction levels.
bit_widths = 2,4
; Tail mass discarded on each side before placing distribution-aware bins.
clip_quantile = 0.001
; Numerical integration resolution for the Lloyd-Max bin centroids.
centroid_integration_points = 2048

[pwl]
; Piecewise-linear tanh approximation settings.
num_segments = 8
tanh_clip = 4.0
; Probability margin kept away from 0 and 1 when placing the outer breakpoints.
boundary_margin = 0.001

[benchmark]
models = lenet5,vgg_mini,resnet_mini
models_config = ${paths:config_dir}/models.json
